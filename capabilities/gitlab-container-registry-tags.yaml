        description: Get details of a single tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: repository_id
          in: path
          type: integer
          required: true
        - name: tag_name
          in: path
          type: string
          required: true
      - name: deleterepositorytag
        method: DELETE
        description: Delete a single tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: repository_id
          in: path
          type: integer
          required: true
        - name: tag_name
          in: path
          type: string
          required: true
