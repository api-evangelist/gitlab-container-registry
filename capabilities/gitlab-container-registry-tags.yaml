      path: /projects/{id}/registry/repositories/{repository_id}/tags
      operations:
      - name: listrepositorytags
        method: GET
        description: List tags for a repository
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: repository_id
          in: path
          type: integer
          required: true
      - name: deleterepositorytagsbulk
        method: DELETE
        description: Delete repository tags in bulk
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: repository_id
          in: path
          type: integer
          required: true
        - name: name_regex_delete
          in: query
          type: string
        - name: name_regex_keep
          in: query
          type: string
        - name: keep_n
          in: query
          type: integer
        - name: older_than
          in: query
